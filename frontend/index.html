<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> Taskify</h1>
            <p>Manage your daily tasks efficiently</p>
        </header>

        <div class="task-form-container">
            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <input type="text" id="taskTitle" placeholder="Task title *" required>
                    <span class="error-message" id="titleError"></span>
                </div>
                <div class="form-group">
                    <textarea id="taskDescription" placeholder="Task description (optional)"></textarea>
                </div>
                <div class="form-group">
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </form>
        </div>

        <div class="tasks-container">
            <div class="tasks-header">
                <h2>Your Tasks</h2>
                <div class="task-stats">
                    <span id="totalTasks">0</span> tasks
                </div>
            </div>
            <div id="tasksList" class="tasks-list">
                <div class="loading" id="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading tasks...
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Task</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="editTaskForm" class="task-form">
                <div class="form-group">
                    <input type="text" id="editTaskTitle" placeholder="Task title *" required>
                    <span class="error-message" id="editTitleError"></span>
                </div>
                <div class="form-group">
                    <textarea id="editTaskDescription" placeholder="Task description (optional)"></textarea>
                </div>
                <div class="form-group">
                    <select id="editTaskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Update Task
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
